<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <meta name="theme-color" content="#0A0E1A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Bolão Anperez</title>
  <meta name="description" content="Bolão Anperez — Plataforma de gestão de Bolões" />
  <link rel="apple-touch-icon" href="%BASE_URL%icons/192.png" />
  <link rel="icon" type="image/x-icon" href="%BASE_URL%icons/192.png" />
  <script>
    (function() {
      var base = '%BASE_URL%';
      var path = window.location.pathname;
      if (path && path.startsWith(base) && !window.location.hash) {
        var route = path.substring(base.length);
        if (route && route !== '/' && route !== '') {
          window.location.replace(window.location.origin + base + '#/' + route);
        }
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
