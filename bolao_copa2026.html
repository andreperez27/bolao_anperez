            </div>
          </div>}
          {ranking.map((c, idx) => <div key={c.id} style={{ background: C.card, border: `1px solid ${C.cardBorder}`, borderRadius: 12, padding: 16, marginBottom: 8, display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ color: idx < 3 ? C.dourado : C.textoSec, fontWeight: 900, fontSize: 18, width: 32, textAlign: "center" }}>{idx < 3 ? medalhas[idx] : `${idx + 1}º`}</div>
            <div style={{ flex: 1 }}>
              <div style={{ color: C.texto, fontWeight: 700, fontSize: 15 }}>{c.participante} <span style={{ color: C.textoSec, fontWeight: 400, fontSize: 12 }}>({c.nome || "Cartela"})</span></div>
              <div style={{ color: C.textoSec, fontSize: 12, marginTop: 2 }}>{c.acertos}/{c.total} acertos · Campeão: {c.campeao || "—"} {c.campeao === campeoRealEdit && campeoRealEdit ? "✅ +" + pontosCampeaoPorFase(c.campeao_fase || "grupos") : ""}<span style={{ marginLeft: 6 }}><StatusBadge status={c.status} /></span></div>
            </div>
            <div style={{ textAlign: "right" }}><div style={{ color: C.dourado, fontWeight: 900, fontSize: 20 }}>{c.pts}</div><div style={{ color: C.textoSec, fontSize: 11 }}>pts</div></div>
          </div>)}
          {ranking.length === 0 && <div style={{ textAlign: "center", color: C.textoSec, padding: 40 }}>Nenhuma cartela ainda</div>}
          <div style={{ marginTop: 20 }}>
            {!isAdmin ? <Card><div style={{ color: C.textoSec, fontSize: 13, marginBottom: 8 }}>🔐 Área do Administrador</div>
              <div style={{ display: "flex", gap: 8 }}><input type="password" placeholder="Senha admin" value={senhaInput} onChange={e => setSenhaInput(e.target.value)} style={{ flex: 1, background: "#1a2234", border: `1px solid ${C.cardBorder}`, borderRadius: 8, color: C.texto, padding: "8px 12px", fontSize: 14 }} />
              <Btn onClick={() => { if (senhaInput === "perez2026") { onSetAdmin(resultadosEdit, campeoRealEdit, true); } else alert("Senha incorreta"); }} cor={C.vermelho}>Entrar</Btn></div></Card> : <div>
              <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                {["validar", "resultados", "config"].map(tab => <button key={tab} onClick={() => setAbaAdmin(tab)} style={{ flex: 1, padding: "10px", background: abaAdmin === tab ? C.vermelho : C.card, color: abaAdmin === tab ? "#fff" : C.textoSec, border: `1px solid ${abaAdmin === tab ? C.vermelho : C.cardBorder}`, borderRadius: 8, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>{tab === "validar" ? "✅ Validar" : tab === "resultados" ? "⚽ Resultados" : "⚙️ Config"}</button>)}
              </div>
              {abaAdmin === "validar" && <Card style={{ border: `2px solid ${C.verde}44` }}>
                <div style={{ color: C.verde, fontWeight: 800, fontSize: 14, marginBottom: 12 }}>✅ Validar Cartelas</div>
                {cartelas.filter(c => c.status !== "validada").length === 0 && <div style={{ color: C.textoSec, fontSize: 13, textAlign: "center", padding: 12 }}>Todas as cartelas já estão validadas!</div>}
                {cartelas.filter(c => c.status !== "validada").map(c => <div key={c.id} style={{ background: "#0d1b2a", borderRadius: 8, padding: 12, marginBottom: 8, display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ flex: 1 }}><div style={{ color: C.texto, fontWeight: 700, fontSize: 14 }}>{c.participante} — {c.nome || "Cartela"}</div><div style={{ color: C.textoSec, fontSize: 12 }}>{Object.keys(c.palpites || {}).filter(k => k !== "__campeo").length}/{JOGOS_GRUPOS.length} palpites · Campeão: {c.campeao || "—"} · <StatusBadge status={c.status} /></div></div>
                  <div style={{ display: "flex", gap: 6 }}><Btn onClick={() => onValidarCartela(c.id, "validada")} cor={C.verde} style={{ padding: "6px 12px", fontSize: 12 }}>✅</Btn><Btn onClick={() => onValidarCartela(c.id, "rejeitada")} cor={C.vermelho} style={{ padding: "6px 12px", fontSize: 12 }}>❌</Btn></div>
                </div>)}
              </Card>}
              {abaAdmin === "resultados" && <Card style={{ border: `2px solid ${C.vermelho}44` }}>
                <div style={{ color: C.vermelho, fontWeight: 800, fontSize: 14, marginBottom: 12 }}>⚽ Resultados dos Jogos</div>
                <div style={{ marginBottom: 12, display: "flex", gap: 8 }}><input value={apiUrl} onChange={e => setApiUrl(e.target.value)} placeholder="URL da API" style={{ flex: 1, background: "#1a2234", border: `1px solid ${C.cardBorder}`, borderRadius: 8, color: C.texto, padding: "8px 12px", fontSize: 13 }} /><Btn onClick={buscarResultados} cor={C.azul} disabled={buscando} style={{ padding: "8px 14px", fontSize: 12 }}>{buscando ? "⏳" : "🔍 Buscar"}</Btn></div>
                {msgBusca && <div style={{ color: C.textoSec, fontSize: 12, marginBottom: 10 }}>{msgBusca}</div>}
                <div style={{ marginBottom: 12 }}><div style={{ color: C.textoSec, fontSize: 13, marginBottom: 6 }}>Campeão real</div>
                  <select value={campeoRealEdit} onChange={e => { setCampeoRealEdit(e.target.value); onSetAdmin(resultadosEdit, e.target.value, true); }} style={{ width: "100%", background: "#1a2234", border: `2px solid ${C.dourado}`, borderRadius: 8, color: C.dourado, padding: "8px 12px", fontSize: 14, fontWeight: 700 }}>
                    <option value="">Ainda não definido</option>
                    {TODOS_TIMES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <select value={jogoSelecionado} onChange={e => setJogoSelecionado(e.target.value)} style={{ width: "100%", background: "#1a2234", border: `1px solid ${C.cardBorder}`, borderRadius: 8, color: C.texto, padding: "8px 12px", fontSize: 13, marginBottom: 8 }}>
                  <option value="">Selecione o jogo...</option>
                  {JOGOS_TODOS.map(j => <option key={j.id} value={j.id}>{j.time_a} × {j.time_b} ({j.grupo}){resultadosEdit[j.id] ? ` ✓ ${resultadosEdit[j.id].placar_a}-${resultadosEdit[j.id].placar_b}` : ""}</option>)}
                </select>
                {jogoSelecionado && <FormResultadoAdmin jogo={JOGOS_GRUPOS.find(j => j.id === jogoSelecionado)} resultadoSalvo={resultadosEdit[jogoSelecionado]} onSalvar={salvarResultado} />}
              </Card>}
              {abaAdmin === "config" && <Card style={{ border: `2px solid ${C.azul}44` }}>
                <div style={{ color: C.azulClaro, fontWeight: 800, fontSize: 14, marginBottom: 12 }}>⚙️ Configurações</div>
                <div style={{ marginBottom: 14 }}><div style={{ color: C.textoSec, fontSize: 13, marginBottom: 6 }}>Valor da Aposta (R$)</div><input type="number" step="0.50" min="0" value={valorAposta} onChange={e => setValorAposta(e.target.value)} style={{ width: "100%", background: "#1a2234", border: `2px solid ${C.cardBorder}`, borderRadius: 8, color: C.dourado, padding: "10px 12px", fontSize: 18, fontWeight: 700 }} /></div>
                <div style={{ marginBottom: 14 }}><div style={{ color: C.textoSec, fontSize: 13, marginBottom: 6 }}>URL da API de Resultados</div><input value={apiUrl} onChange={e => setApiUrl(e.target.value)} placeholder="https://worldcupjson.net/matches" style={{ width: "100%", background: "#1a2234", border: `2px solid ${C.cardBorder}`, borderRadius: 8, color: C.texto, padding: "10px 12px", fontSize: 14 }} /></div>
                <Btn onClick={salvarConfig} cor={C.azul} style={{ width: "100%" }}>💾 Salvar Configuração</Btn>
              </Card>}
            </div>}
          </div>
        </div>
      </div>;
    };

    const FormResultadoAdmin = ({ jogo, resultadoSalvo, onSalvar }) => {
      const [ga, setGa] = useState(resultadoSalvo?.placar_a ?? ""); const [gb, setGb] = useState(resultadoSalvo?.placar_b ?? "");
      useEffect(() => { setGa(resultadoSalvo?.placar_a ?? ""); setGb(resultadoSalvo?.placar_b ?? ""); }, [jogo?.id, resultadoSalvo]);
      if (!jogo) return null;
      return <div><div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
        <span style={{ color: C.texto, flex: 1, textAlign: "right", fontWeight: 700 }}>{jogo.time_a}</span>
        <input type="number" inputMode="numeric" pattern="[0-9]*" value={ga} onChange={e => setGa(e.target.value)} style={{ width: 52, textAlign: "center", background: "#1a2234", border: `2px solid ${C.cardBorder}`, borderRadius: 6, color: C.texto, padding: "6px 0", fontSize: 18, fontWeight: 800 }} />
        <span style={{ color: C.textoSec }}>×</span>
        <input type="number" inputMode="numeric" pattern="[0-9]*" value={gb} onChange={e => setGb(e.target.value)} style={{ width: 52, textAlign: "center", background: "#1a2234", border: `2px solid ${C.cardBorder}`, borderRadius: 6, color: C.texto, padding: "6px 0", fontSize: 18, fontWeight: 800 }} />
        <span style={{ color: C.texto, flex: 1, fontWeight: 700 }}>{jogo.time_b}</span>
      </div>
      <Btn onClick={() => { if (ga !== "" && gb !== "") onSalvar(jogo.id, ga, gb); }} cor={C.verde} style={{ width: "100%" }}>✓ Salvar</Btn></div>;
    };

    const ModalDownload = ({ cartela, participante, onFechar }) => {
      if (!cartela) return null;
      return <div style={{ position: "fixed", inset: 0, zIndex: 99999, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
        <div style={{ background: C.card, border: `1px solid ${C.cardBorder}`, borderRadius: 16, padding: 32, maxWidth: 400, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📄</div>
          <div style={{ color: C.dourado, fontWeight: 900, fontSize: 18, marginBottom: 8 }}>Baixar Cartela</div>
          <div style={{ color: C.textoSec, fontSize: 13, marginBottom: 20, lineHeight: 1.5 }}>Será baixado um arquivo <strong>.html</strong> com sua cartela. Abra o arquivo e use <strong>Ctrl+P</strong> para imprimir ou salvar como PDF.</div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={() => { baixarCartelaHTML(cartela, participante); onFechar(); }} cor={C.azul} style={{ flex: 1 }}>⬇️ Baixar Cartela</Btn>
            <button onClick={onFechar} style={{ background: "transparent", border: `1px solid ${C.cardBorder}`, borderRadius: 8, padding: "10px 16px", color: C.textoSec, fontSize: 14, cursor: "pointer" }}>Cancelar</button>
          </div>
        </div>
      </div>;
    };

    function App() {
      const [tela, setTela] = useState("cadastro");
      const [participante, setParticipante] = useState("");
      const [cartelas, setCartelas] = useState([]);
      const [resultados, setResultados] = useState({});
      const [campeoReal, setCampeoReal] = useState("");
      const [isAdmin, setIsAdmin] = useState(false);
      const [showInstrucoes, setShowInstrucoes] = useState(false);
      const [loading, setLoading] = useState(true);
      const [cartelaEditando, setCartelaEditando] = useState(null);
      const [config, setConfig] = useState({ valor_aposta: 20, api_url: "" });
      const [cartelaDownload, setCartelaDownload] = useState(null);

      useEffect(() => {
        const seen = localStorage.getItem("bolao_instrucoes_visto");
        if (!seen) { setShowInstrucoes(true); localStorage.setItem("bolao_instrucoes_visto", "true"); }
        (async () => {
          try { const data = await supabaseClient.from("cartelas").select(null, { order: "created_at", dir: "desc" }); if (Array.isArray(data)) setCartelas(data); } catch (e) { try { const r = localStorage.getItem("bolao_cartelas"); if (r) setCartelas(JSON.parse(r)); } catch (_) {} }
          try { const adminData = await supabaseClient.from("admin").select({ id: 1 }); if (Array.isArray(adminData) && adminData.length > 0) { setResultados(adminData[0].resultados || {}); setCampeoReal(adminData[0].campeo_real || ""); } } catch (e) { try { const r = localStorage.getItem(STORAGE_KEY_ADMIN); if (r) { const d = JSON.parse(r); setResultados(d.resultados || {}); setCampeoReal(d.campeoReal || ""); } } catch (_) {} }
          try { const cfgData = await supabaseClient.from("config").select({ id: 1 }); if (Array.isArray(cfgData) && cfgData.length > 0) setConfig({ valor_aposta: cfgData[0].valor_aposta || 20, api_url: cfgData[0].api_url || "" }); } catch (e) { try { const r = localStorage.getItem("bolao_config"); if (r) setConfig(JSON.parse(r)); } catch (_) {} }
          setLoading(false);
        })();
      }, []);

      const entrar = async (nome, senha, isCadastro) => {
        setIsAdmin(false); let encontrado = false;
        try { const data = await supabaseClient.from("jogadores").select({ nome }); if (Array.isArray(data) && data.length > 0) { encontrado = true; if (data[0].senha !== senha) throw new Error("Senha incorreta!"); } } catch (e) { if (e.message === "Senha incorreta!") throw e; const r = localStorage.getItem(STORAGE_KEY_JOGADORES); const j = r ? JSON.parse(r) : {}; if (j[nome]) { encontrado = true; if (j[nome] !== senha) throw new Error("Senha incorreta!"); } }
        if (encontrado && !isCadastro) { setParticipante(nome); setTela("minhas_cartelas"); return; }
        if (encontrado && isCadastro) throw new Error("Usuário já existe!");
        if (!encontrado && !isCadastro) throw new Error("Usuário não encontrado. Clique em 'Cadastrar'.");
        try { await supabaseClient.from("jogadores").upsert({ nome, senha }); } catch (_) { try { const r = localStorage.getItem(STORAGE_KEY_JOGADORES); const j = r ? JSON.parse(r) : {}; j[nome] = senha; localStorage.setItem(STORAGE_KEY_JOGADORES, JSON.stringify(j)); } catch (_) {} }
        setParticipante(nome); setTela("minhas_cartelas");
      };

      const salvarCartela = async (cartela) => {
        const nova = { ...cartela }; const isNew = !nova.id;
        if (!nova.campeao_fase && nova.campeao) nova.campeao_fase = getFaseAtual(resultados);
        if (isNew) { nova.id = "cart_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8); nova.participante = participante; nova.status = "aguardando"; nova.created_at = new Date().toISOString(); setCartelas(prev => [nova, ...prev]); }
        else { nova.updated_at = new Date().toISOString(); setCartelas(prev => prev.map(c => c.id === nova.id ? nova : c)); }
        try { await supabaseClient.from("cartelas").upsert({ id: nova.id, participante: nova.participante, nome: nova.nome || "Cartela", palpites: nova.palpites, campeao: nova.campeao || "", campeao_fase: nova.campeao_fase || "grupos", status: nova.status, valor_pago: config.valor_aposta || 20, updated_at: new Date().toISOString() }); } catch (e) { try { localStorage.setItem("bolao_cartelas", JSON.stringify(isNew ? [{ ...nova }, ...cartelas] : cartelas.map(c => c.id === nova.id ? nova : c))); } catch (_) {} }
        setTela("minhas_cartelas");
      };

      const sair = () => { setParticipante(""); setIsAdmin(false); setCartelaEditando(null); setCartelas([]); setResultados({}); setCampeoReal(""); setConfig({ valor_aposta: 20, api_url: "" }); setTela("cadastro"); try { localStorage.removeItem("bolao_admin"); } catch (_) {} try { localStorage.removeItem("bolao_isAdmin"); } catch (_) {} };
      const excluirConta = async () => {
        if (!confirm("Tem certeza? Todas as suas cartelas serão excluídas!")) return;
        const senhaConfirm = prompt("Digite sua senha de 6 dígitos para confirmar:");
        if (!senhaConfirm || senhaConfirm.length !== 6) return;
        try { const data = await supabaseClient.from("jogadores").select({ nome: participante }); if (Array.isArray(data) && data.length > 0 && data[0].senha !== senhaConfirm) { alert("Senha incorreta!"); return; } } catch (_) { const r = localStorage.getItem(STORAGE_KEY_JOGADORES); const j = r ? JSON.parse(r) : {}; if (j[participante] && j[participante] !== senhaConfirm) { alert("Senha incorreta!"); return; } }
        setCartelas(prev => prev.filter(c => c.participante !== participante));
        try { await supabaseClient.from("jogadores").delete({ nome: participante }); } catch (_) {}
        const ids = cartelas.filter(c => c.participante === participante).map(c => c.id);
        for (const id of ids) { try { await supabaseClient.from("cartelas").delete({ id }); } catch (_) {} }
        try { const r = localStorage.getItem(STORAGE_KEY_JOGADORES); const j = r ? JSON.parse(r) : {}; delete j[participante]; localStorage.setItem(STORAGE_KEY_JOGADORES, JSON.stringify(j)); } catch (_) {}
        setParticipante(""); setIsAdmin(false); setTela("cadastro");
      };
      const excluirCartela = async (cartelaId) => { if (!confirm("Tem certeza que deseja excluir esta cartela?")) return; setCartelas(prev => prev.filter(c => c.id !== cartelaId)); try { await supabaseClient.from("cartelas").delete({ id: cartelaId }); } catch (e) { try { localStorage.setItem("bolao_cartelas", JSON.stringify(cartelas.filter(c => c.id !== cartelaId))); } catch (_) {} } };
      const validarCartela = async (cartelaId, status) => { setCartelas(prev => prev.map(c => c.id === cartelaId ? { ...c, status } : c)); try { await supabaseClient.from("cartelas").upsert({ id: cartelaId, status, updated_at: new Date().toISOString() }); } catch (e) { try { localStorage.setItem("bolao_cartelas", JSON.stringify(cartelas.map(c => c.id === cartelaId ? { ...c, status } : c))); } catch (_) {} } };
      const refreshCartelas = async () => { try { const data = await supabaseClient.from("cartelas").select(null, { order: "created_at", dir: "desc" }); if (Array.isArray(data)) setCartelas(data); } catch (_) {} };
      const salvarAdmin = async (novosResultados, novoCampeo, setAdminFlag = false) => { setResultados(novosResultados); setCampeoReal(novoCampeo); if (setAdminFlag) { setIsAdmin(true); refreshCartelas(); } try { await supabaseClient.from("admin").upsert({ id: 1, resultados: novosResultados, campeo_real: novoCampeo, updated_at: new Date().toISOString() }); } catch (e) { try { localStorage.setItem(STORAGE_KEY_ADMIN, JSON.stringify({ resultados: novosResultados, campeoReal: novoCampeo })); } catch (_) {} } };

      const styles = { fontFamily: "'Segoe UI', system-ui, sans-serif", background: C.bg, minHeight: "100vh", color: C.texto, maxWidth: 480, margin: "0 auto" };
      if (loading) return <div style={{ ...styles, display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: C.dourado, fontSize: 18, fontWeight: 700 }}>🏆 Carregando...</div></div>;

      const renderTela = () => {
        switch (tela) {
          case "cadastro": return <TelaCadastro onEntrar={entrar} onShowInstrucoes={() => setShowInstrucoes(true)} />;
          case "minhas_cartelas": return <TelaMinhasCartelas participante={participante} cartelas={cartelas} config={config}
            onNovaCartela={() => { setCartelaEditando(null); setTela("preencher_cartela"); }}
            onVerCartela={(c) => { setCartelaEditando(c); setTela("preencher_cartela"); }}
            onVerRanking={() => setTela("ranking")}
            onExcluirCartela={excluirCartela}
            onDownloadCartela={(c) => { setCartelaDownload(c); }}
            onSair={sair}
            onExcluirConta={excluirConta}
            onShowInstrucoes={() => setShowInstrucoes(true)} />;
          case "preencher_cartela": return <TelaPreencherCartela cartela={cartelaEditando} config={config} resultados={resultados}
            onSalvar={salvarCartela}
            onVoltar={() => setTela("minhas_cartelas")} />;
          case "ranking": return <TelaRanking cartelas={cartelas} resultados={resultados} campeoReal={campeoReal} config={config}
            onVoltar={() => setTela(participante ? "minhas_cartelas" : "cadastro")}
            isAdmin={isAdmin} onSetAdmin={salvarAdmin}
            onValidarCartela={validarCartela}
            onShowInstrucoes={() => setShowInstrucoes(true)} />;
          default: return <TelaCadastro onEntrar={entrar} onShowInstrucoes={() => setShowInstrucoes(true)} />;
        }
      };

      return <div style={styles}>
        {renderTela()}
        {showInstrucoes && <ModalInstrucoes onFechar={() => setShowInstrucoes(false)} />}
        {cartelaDownload && <ModalDownload cartela={cartelaDownload} participante={participante} onFechar={() => setCartelaDownload(null)} />}
      </div>;
    }

    createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
